version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 14  # Wait 14 days before creating PRs
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "go dependencies"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 14  # Wait 14 days before creating PRs
